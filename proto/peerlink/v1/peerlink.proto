syntax = "proto3";

package peerlink.v1;

option go_package = "github.com/rmacdonaldsmith/eventmesh-go/proto/peerlink/v1;peerlinkv1";

// Top-level streaming service.
// Each peer establishes a single long-lived bidirectional stream.
service PeerLink {
  rpc EventStream(stream PeerMessage) returns (stream PeerMessage);
}

// Wrapper message for all frame types.
// Separates data plane (user events) from control plane (subscription gossip) communication.
message PeerMessage {
  oneof kind {
    Handshake handshake = 1;
    Event event = 2;              // Data plane: user events
    Ack ack = 3;
    Heartbeat heartbeat = 4;
    ControlPlaneMessage control_plane = 5;  // Control plane: subscription gossip
  }
}

// Sent once at stream startup.
message Handshake {
  string node_id = 1;            // Unique peer identifier
  uint32 protocol_version = 2;   // Major.minor encoded as XYY (e.g. 100 = v1.0)
  repeated string features = 3;  // Optional supported features (for negotiation)
}

// Application-level event payload.
// Events are organized by topic with independent offset sequences per topic.
message Event {
  string topic = 1;
  int64 offset = 2;                     // Topic-specific log offset
  bytes payload = 3;                    // Raw event bytes
  map<string, string> headers = 4;      // Key-value metadata
}

// ACK from receiver to sender.
// Used for at-least-once replay semantics per topic.
message Ack {
  string topic = 1;
  int64 offset = 2;              // Highest contiguous offset received/applied for topic
}

// Lightweight heartbeat/ping.
// Can also carry RTT measurement.
message Heartbeat {
  int64 timestamp = 1;
}

// Control plane message wrapper for subscription gossip and other mesh coordination.
// Separates control plane communication from user event data plane.
message ControlPlaneMessage {
  oneof kind {
    SubscriptionChange subscription_change = 1;  // Subscription gossip between nodes
  }
}

// Subscription change notification for peer-to-peer gossip.
// Replaces the previous approach of using special Event topics like "__mesh.subscription.subscribe".
message SubscriptionChange {
  string action = 1;     // "subscribe" or "unsubscribe"
  string client_id = 2;  // ID of the client making the change
  string topic = 3;      // Topic pattern being subscribed/unsubscribed
  string node_id = 4;    // ID of the node where the change occurred
}