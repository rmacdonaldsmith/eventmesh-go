syntax = "proto3";

package peerlink.v1;

option go_package = "github.com/rmacdonaldsmith/eventmesh-go/proto/peerlink/v1;peerlinkv1";

// Top-level streaming service.
// Each peer establishes a single long-lived bidirectional stream. Data-plane
// and control-plane frames are logically separated inside PeerMessage, but they
// are currently multiplexed over this one physical stream.
service PeerLink {
  rpc EventStream(stream PeerMessage) returns (stream PeerMessage);
}

// Wrapper message for all frame types.
// Provides logical separation between data-plane user events and control-plane
// coordination messages while sharing one EventStream transport.
message PeerMessage {
  oneof kind {
    Handshake handshake = 1;
    Event event = 2;              // Data plane: user events
    Ack ack = 3;
    Heartbeat heartbeat = 4;
    ControlPlaneMessage control_plane = 5;  // Control plane: topic-interest gossip
  }
}

// Sent once at stream startup.
message Handshake {
  string node_id = 1;            // Unique peer identifier
  uint32 protocol_version = 2;   // Major.minor encoded as XYY (e.g. 100 = v1.0)
  repeated string features = 3;  // Optional supported features (for negotiation)
}

// Application-level event payload.
// Events are organized by topic with independent offset sequences per topic.
message Event {
  string topic = 1;
  int64 offset = 2;                     // Topic-specific log offset
  bytes payload = 3;                    // Raw event bytes
  map<string, string> headers = 4;      // Key-value metadata
}

// ACK from receiver to sender.
// Used for at-least-once replay semantics per topic.
message Ack {
  string topic = 1;
  int64 offset = 2;              // Highest contiguous offset received/applied for topic
}

// Lightweight heartbeat/ping.
// Can also carry RTT measurement.
message Heartbeat {
  int64 timestamp = 1;
}

// Control plane message wrapper for topic-interest gossip and other mesh coordination.
// Control-plane frames are never user events, even though they share the same
// physical EventStream as data-plane frames.
message ControlPlaneMessage {
  oneof kind {
    InterestUpdate interest_update = 1;      // Aggregate node-level interest delta
    InterestSnapshot interest_snapshot = 2;  // Complete aggregate node-level interest snapshot
  }
}

// Aggregate topic-interest delta for peer-to-peer gossip.
// Peers gossip node-level topic interest, not individual client subscriptions.
message InterestUpdate {
  string node_id = 1;  // ID of the node where aggregate interest changed
  string action = 2;   // "subscribe" or "unsubscribe"
  string topic = 3;    // Topic pattern whose aggregate interest changed
}

// Complete aggregate topic-interest snapshot for peer-to-peer gossip.
// Receivers replace their entire stored view for node_id with topics.
message InterestSnapshot {
  string node_id = 1;          // ID of the node sending its current aggregate interest view
  repeated string topics = 2;  // Current aggregate topic patterns with local interest
}
